version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ai-influencer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: influencer_db
      POSTGRES_USER: influencer_user
      POSTGRES_PASSWORD: influencer_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - influencer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U influencer_user -d influencer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación backend
  influencer-backend:
    build: .
    container_name: ai-influencer-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Volumen para persistencia de datos (imágenes generadas)
      - data_volume:/data
      # Volumen para identity pack (imágenes de referencia)
      - ./identity_pack:/identity_pack:ro
    env_file:
      - .env
    environment:
      # Configuración de PostgreSQL
      - DATABASE_URL=postgresql://influencer_user:influencer_password@postgres:5432/influencer_db
      - DATA_PATH=/data
      - IDENTITY_PACK_PATH=/identity_pack
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - influencer-network

networks:
  influencer-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  data_volume:
    driver: local
